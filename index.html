<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR名刺（ズーム対応）</title>

  <!-- A-Frame & MindAR -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin:0; overflow:hidden; }
    #scanning-overlay {
      position:absolute; inset:0;
      display:flex; justify-content:center; align-items:center;
      background:rgba(0,0,0,0.5); color:white;
      font-size:1.5rem; z-index:5;
    }
    #voiceBtn {
      position:absolute; bottom:20px; left:20px;
      padding:10px 20px; z-index:10; font-size:1.2rem;
      background:white;
    }
  </style>
</head>

<body>

  <div id="scanning-overlay">名刺の画像にかざしてください…</div>

  <audio id="voice" src="./assets/voice.mp3"></audio>
  <button id="voiceBtn">▶ 音声を再生</button>

  <a-scene
    mindar-image="imageTargetSrc: ./marker/marker.mind;"
    vr-mode-ui="enabled:false"
    device-orientation-permission-ui="enabled:false">

    <a-assets>
      <a-asset-item id="avatarModel" src="./scene/model.glb"></a-asset-item>
    </a-assets>

    <!-- 📌 ズームするので、camera を "cameraRig" に入れる -->
    <a-entity id="cameraRig" position="0 0 0">
      <a-camera look-controls="enabled:false"></a-camera>
    </a-entity>

    <a-entity mindar-image-target="targetIndex:0">
      <a-gltf-model
        id="avatar"
        src="#avatarModel"
        scale="1.6 1.6 1.6"
        position="0 0.05 0"
        rotation="0 0 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 7000; easing: linear;">
      </a-gltf-model>
    </a-entity>
  </a-scene>

  <script>
    /* ---------------------------
       音声
    --------------------------- */
    voiceBtn.addEventListener("click", () => {
      document.getElementById("voice").play();
    });

    /* ---------------------------
       AR準備完了
    --------------------------- */
    document.querySelector("a-scene").addEventListener("arReady", () => {
      document.getElementById("scanning-overlay").style.display = "none";
    });

    /* ---------------------------
       📌 ピンチでズーム（安全版）
       - pinching → touchmove で距離を測る
       - cameraRig の z を変えるだけ
       - モデルや MindAR のカメラは触らないから安全
    --------------------------- */
    const rig = document.getElementById("cameraRig");
    let lastDistance = null;

    window.addEventListener("touchmove", (ev) => {
      if (ev.touches.length === 2) {
        const t1 = ev.touches[0];
        const t2 = ev.touches[1];

        const dx = t1.clientX - t2.clientX;
        const dy = t1.clientY - t2.clientY;

        const distance = Math.sqrt(dx*dx + dy*dy);

        if (lastDistance !== null) {
          const delta = (lastDistance - distance) * 0.01;

          // z を安全に変更（ズーム）
          let z = rig.getAttribute("position").z + delta;
          z = Math.min(2.5, Math.max(-2.0, z)); // ズーム範囲
          rig.setAttribute("position", {x:0, y:0, z:z});
        }

        lastDistance = distance;
      }
    });

    window.addEventListener("touchend", () => {
      lastDistance = null;
    });
  </script>

</body>
</html>
