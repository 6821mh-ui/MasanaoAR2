<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instant AR Card</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin:0; overflow:hidden; }

    #overlay {
      position:absolute;
      top:10px; left:0; right:0;
      text-align:center;
      z-index:10;
    }

    #playAudioBtn {
      background:#007bff;
      color:white;
      padding:10px 18px;
      border-radius:8px;
      font-size:18px;
      border:none;
    }
  </style>
</head>

<body>

  <!--  音声ボタン（iPhone必須） -->
  <div id="overlay">
    <button id="playAudioBtn">▶ 音声を再生する</button>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./marker/marker.mind;
                  filterMinCF: 0.1;
                  filterBeta: 0.03;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <a-asset-item id="avatarModel" src="./scene/model.glb"></a-asset-item>
      <audio id="voice" src="./assets/voice.mp3"></audio>
    </a-assets>

    <a-camera look-controls="enabled:false"></a-camera>

    <!--  マーカーに追従する Anchor  -->
    <a-entity mindar-image-target="targetIndex: 0" id="anchor">

      <!-- 揺れ防止：ラップエンティティ -->
      <a-entity id="wrapper" position="0 0 0" rotation="0 0 0" scale="2 2 2">
        <a-gltf-model id="avatar" src="#avatarModel"></a-gltf-model>
      </a-entity>

    </a-entity>

  </a-scene>

  <script>
    const anchor = document.querySelector("#anchor");
    const wrapper = document.querySelector("#wrapper");
    const audio = document.querySelector("#voice");
    const button = document.querySelector("#playAudioBtn");

    let rotateInterval = null;

    // 音声再生ボタン（iPhone必須）
    button.addEventListener("click", () => {
      audio.play();
      button.style.display = "none";
    });

    // マーカーを見失ったら停止
    anchor.addEventListener("targetLost", () => {
      if (rotateInterval) clearInterval(rotateInterval);
      rotateInterval = null;
    });

    // マーカーを発見 → 回転開始
    anchor.addEventListener("targetFound", () => {
      if (rotateInterval) return;

      rotateInterval = setInterval(() => {
        let r = wrapper.getAttribute("rotation");
        r.y += 1;        // ← 毎フレーム1度回す
        wrapper.setAttribute("rotation", r);
      }, 16);            // 60fps
    });
  </script>

</body>
</html>
