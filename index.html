<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR名刺（回転モデル）</title>

  <!-- A-Frame & MindAR -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin:0; overflow:hidden; }
    #scanning-overlay {
      position:absolute; inset:0;
      display:flex; justify-content:center; align-items:center;
      background:rgba(0,0,0,0.5); color:white;
      font-size:1.5rem; z-index:5;
    }
  </style>
</head>

<body>

  <!-- スキャン中オーバーレイ -->
  <div id="scanning-overlay">名刺の画像にかざしてください…</div>

  <a-scene
    mindar-image="imageTargetSrc: ./marker/marker.mind;"
    vr-mode-ui="enabled:false"
    device-orientation-permission-ui="enabled:false"
    renderer="colorManagement:true, physicallyCorrectLights"
    color-space="sRGB">

    <a-assets>
      <!-- どちらでもOK（あなたのGLB名を使ってください） -->
      <a-asset-item id="avatarModel" src="./scene/model(glb or model_fixed.glb)"></a-asset-item>
    </a-assets>

    <a-camera look-controls="enabled:false"></a-camera>

    <!-- マーカー検出 -->
    <a-entity mindar-image-target="targetIndex:0">

      <!-- ★ 回転専用の親（MindARはここを触りません） -->
      <a-entity id="rotator">

        <!-- ★ モデル -->
        <a-gltf-model
          src="#avatarModel"
          scale="1.7 1.7 1.7"
          position="0 0 0">
        </a-gltf-model>

      </a-entity>
    </a-entity>

  </a-scene>

  <script>
    // ★★★★★ 必ず回転するコンポーネント ★★★★★
    AFRAME.registerComponent("force-rotate", {
      tick: function () {
        this.el.object3D.rotation.y += 0.02; // 速度
      }
    });

    // AR準備完了でオーバーレイ非表示
    const overlay = document.getElementById("scanning-overlay");
    document.querySelector("a-scene").addEventListener("arReady", () => {
      overlay.style.display = "none";
    });

    // DOMロード後に rotator へ回転適用（重要）
    window.addEventListener("load", () => {
      const rotator = document.querySelector("#rotator");
      if (rotator) {
        rotator.setAttribute("force-rotate", "");
      }
    });
  </script>

</body>
</html>
