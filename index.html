<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR名刺（音声つき）</title>

    <!-- A-Frame & MindAR -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin:0; overflow:hidden; }

      #scanning-overlay {
        position:absolute; inset:0;
        display:flex; justify-content:center; align-items:center;
        background:rgba(0,0,0,0.5);
        color:white;
        font-size:1.5rem;
        z-index:5;
      }

      #voiceBtn {
        position:absolute;
        bottom:20px;
        left:20px;
        padding:10px 20px;
        z-index:10;
        font-size:1.2rem;
      }
    </style>
  </head>

  <body>

    <!-- スキャン中 -->
    <div id="scanning-overlay">名刺の画像にかざしてください…</div>

    <!-- 音声 -->
    <audio id="voice" src="./assets/voice.mp3"></audio>
    <button id="voiceBtn">▶ 自己紹介を再生</button>

    <a-scene
      mindar-image="imageTargetSrc: ./marker/marker.mind;"
      vr-mode-ui="enabled:false"
      device-orientation-permission-ui="enabled:false">

      <a-assets>
        <a-asset-item id="avatarModel" src="./scene/model.glb"></a-asset-item>
      </a-assets>

      <a-camera look-controls="enabled:false"></a-camera>

      <!-- ARターゲット -->
      <a-entity mindar-image-target="targetIndex:0">

        <!-- ★ここが修正ポイント（回転追加） -->
        <a-gltf-model
          src="#avatarModel"
          scale="2 2 2"
          position="0 0 0"
          rotation="45 0 0"
          animation="property: rotation; to: 45 360 0; loop: true; dur: 5000; easing: linear;">
        </a-gltf-model>

      </a-entity>

    </a-scene>

    <script>
      // 音声再生
      document.getElementById("voiceBtn").addEventListener("click", () => {
        document.getElementById("voice").play();
      });

      // スキャン表示OFF
      document.querySelector("a-scene").addEventListener("arReady", () => {
        document.getElementById("scanning-overlay").style.display = "none";
      });
    </script>

  </body>
</html>
