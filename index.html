<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>AR名刺</title>

    <!-- MindAR & A-Frame -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar/dist/mindar-image.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe/dist/aframe.min.js"></script>

    <style>
      body { margin: 0; overflow: hidden; }
      #startButton {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        padding: 16px 28px;
        background: #2196F3;
        color: white;
        border-radius: 10px;
        font-size: 20px;
        cursor: pointer;
        z-index: 10;
      }
    </style>
  </head>

  <body>
    <!-- Start Button -->
    <button id="startButton">タップして開始</button>

    <!-- MindAR Scene -->
    <a-scene mindar-image="imageTargetSrc: ./marker/marker.mind; autoStart: false;"
             vr-mode-ui="enabled: false"
             device-orientation-permission-ui="enabled: false"
             embedded
             renderer="colorManagement: true; physicallyCorrectLights: true;">

      <a-assets>
        <a-asset-item id="model" src="./scene/model.glb"></a-asset-item>
        <audio id="voice" src="./assets/voice.mp3"></audio>
      </a-assets>

      <a-camera position="0 0 0"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model src="#model" position="0 0 0" rotation="0 0 0" scale="0.4 0.4 0.4"></a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      window.addEventListener('DOMContentLoaded', () => {
        const startButton = document.querySelector("#startButton");
        const scene = document.querySelector("a-scene");
        const voice = document.querySelector("#voice");

        startButton.onclick = async () => {
          // iPhone Safari の permission 要求
          if (typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function") {
            try {
              await DeviceOrientationEvent.requestPermission();
            } catch (e) {
              console.log("orientation error:", e);
            }
          }

          startButton.style.display = "none";

          // AR開始
          scene.components["mindar-image"].start();

          // 必ずユーザー操作後の再生
          voice.play().catch(e => console.log("Audio error:", e));
        };
      });
    </script>
  </body>
</html>
