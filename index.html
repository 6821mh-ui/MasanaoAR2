<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR名刺（タッチ操作＋自動回転）</title>

  <!-- A-Frame & MindAR -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin:0; overflow:hidden; }
    #scanning-overlay {
      position:absolute; inset:0;
      display:flex; justify-content:center; align-items:center;
      background:rgba(0,0,0,0.5); color:white;
      font-size:1.5rem; z-index:5;
    }
  </style>
</head>

<body>

  <!-- スキャン中オーバーレイ -->
  <div id="scanning-overlay">名刺にかざしてください…</div>

  <a-scene
    mindar-image="imageTargetSrc: ./marker/marker.mind;"
    vr-mode-ui="enabled:false"
    device-orientation-permission-ui="enabled:false"
    renderer="colorManagement:true, physicallyCorrectLights:true"
    color-space="sRGB">

    <a-assets>
      <a-asset-item id="avatarModel" src="./scene/model.glb"></a-asset-item>
    </a-assets>

    <a-camera look-controls="enabled:false"></a-camera>

    <!-- マーカー検出 -->
    <a-entity mindar-image-target="targetIndex:0">
      <a-entity id="rotator" position="0 0 0" scale="1 1 1">
        <a-gltf-model
          src="#avatarModel"
          position="0 0 0">
        </a-gltf-model>
      </a-entity>
    </a-entity>

  </a-scene>

  <script>
    /***************************************************
     * ★ 自動回転コンポーネント
     ***************************************************/
    AFRAME.registerComponent("auto-rotate", {
      tick: function () {
        this.el.object3D.rotation.y += 0.01; // 自動回転の速度
      }
    });


    /***************************************************
     * ★ タッチ操作コンポーネント（回転・ピンチ拡大縮小）
     ***************************************************/
    AFRAME.registerComponent("touch-control", {
      init: function () {
        const el = this.el;
        this.previousTouches = [];
        this.scaleFactor = 1;

        const getDistance = (t1, t2) => {
          return Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
        };

        const getRotation = (t1, t2) => {
          return Math.atan2(t2.clientY - t1.clientY, t2.clientX - t1.clientX);
        };

        let startDistance = null;
        let startRotation = null;
        let startYRotation = 0;

        let lastX = null;
        let lastY = null;

        window.addEventListener("touchstart", (e) => {
          this.previousTouches = [...e.touches];

          if (e.touches.length === 2) {
            startDistance = getDistance(e.touches[0], e.touches[1]);
            startRotation = getRotation(e.touches[0], e.touches[1]);
            startYRotation = el.object3D.rotation.y;
          }

          if (e.touches.length === 1) {
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
          }
        });

        window.addEventListener("touchmove", (e) => {
          if (e.touches.length === 1 && lastX !== null) {
            // 1本指ドラッグ → 水平回転
            const dx = e.touches[0].clientX - lastX;
            el.object3D.rotation.y += dx * 0.01;
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
          }

          if (e.touches.length === 2) {
            // 2本指ピンチ → 拡大縮小
            const newDistance = getDistance(e.touches[0], e.touches[1]);
            const scale = newDistance / startDistance;
            el.object3D.scale.set(scale, scale, scale);

            // 2本指回転（回転角度の変化）
            const newRotation = getRotation(e.touches[0], e.touches[1]);
            const angleDiff = newRotation - startRotation;
            el.object3D.rotation.y = startYRotation + angleDiff;
          }
        });

        window.addEventListener("touchend", () => {
          this.previousTouches = [];
          lastX = null;
          lastY = null;
        });
      }
    });


    /***************************************************
     * ★ オーバーレイを消す
     ***************************************************/
    const overlay = document.getElementById("scanning-overlay");
    document.querySelector("a-scene").addEventListener("arReady", () => {
      overlay.style.display = "none";
    });

    /***************************************************
     * ★ rotator に自動回転 + タッチ操作を付与
     ***************************************************/
    window.addEventListener("load", () => {
      const rotator = document.querySelector("#rotator");
      rotator.setAttribute("auto-rotate", "");
      rotator.setAttribute("touch-control", "");
    });
  </script>

</body>
</html>
