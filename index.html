<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR名刺（安定版）</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin:0; overflow:hidden; }

    #overlay {
      position:absolute;
      inset:0;
      display:flex;
      justify-content:center;
      align-items:center;
      background:rgba(0,0,0,0.5);
      color:#fff;
      font-size:1.5rem;
      z-index:5;
    }

    #btn {
      position:absolute;
      bottom:20px;
      left:20px;
      z-index:10;
      padding:10px 20px;
    }
  </style>

  <!-- 🔄 安定回転コンポーネント -->
  <script>
    AFRAME.registerComponent('auto-rotate', {
      schema: { speed: { type: 'number', default: 30 } },

      tick: function (time, delta) {
        const el = this.el;
        el.object3D.rotation.y += THREE.MathUtils.degToRad(this.data.speed * delta / 1000);
      }
    });
  </script>

  <!-- ✋ ピンチ拡大 -->
  <script>
    AFRAME.registerComponent('pinch-scale', {
      init: function () {
        const el = this.el;
        let startDist = null;
        let baseScale = el.object3D.scale.clone();

        function dist(t) {
          return Math.hypot(
            t[0].pageX - t[1].pageX,
            t[0].pageY - t[1].pageY
          );
        }

        document.addEventListener('touchstart', e => {
          if (e.touches.length === 2) {
            startDist = dist(e.touches);
            baseScale = el.object3D.scale.clone();
          }
        });

        document.addEventListener('touchmove', e => {
          if (e.touches.length === 2 && startDist) {
            const newDist = dist(e.touches);
            const s = newDist / startDist;

            el.object3D.scale.set(
              baseScale.x * s,
              baseScale.y * s,
              baseScale.z * s
            );
          }
        });

        document.addEventListener('touchend', () => {
          startDist = null;
        });
      }
    });
  </script>

</head>

<body>

  <div id="overlay">名刺をかざしてください…</div>

  <audio id="voice" src="./assets/voice.mp3"></audio>
  <button id="btn">▶ 再生</button>

  <a-scene
    mindar-image="imageTargetSrc: ./marker/marker.mind;"
    vr-mode-ui="enabled:false"
    device-orientation-permission-ui="enabled:false">

    <a-assets>
      <a-asset-item id="model" src="./scene/model.glb"></a-asset-item>
    </a-assets>

    <a-camera look-controls="enabled:false"></a-camera>

    <a-entity mindar-image-target="targetIndex:0">

      <!-- ✅ 安定回転版 -->
      <a-gltf-model
        src="#model"
        scale="2 2 2"
        position="0 0 0"

        auto-rotate="speed: 40"
        pinch-scale>
      </a-gltf-model>

    </a-entity>

  </a-scene>

  <script>
    document.getElementById("btn").addEventListener("click", () => {
      document.getElementById("voice").play();
    });

    document.querySelector("a-scene").addEventListener("arReady", () => {
      document.getElementById("overlay").style.display = "none";
    });
  </script>

</body>
</html>
