<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>MindAR AR Model</title>

  <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>

  <style>
    body,html{
      margin:0;
      padding:0;
      overflow:hidden;
    }
    #ar-container{
      width:100vw;
      height:100vh;
    }
  </style>
</head>

<body>
  <div id="ar-container"></div>

  <script type="module">
    import {GLTFLoader} from "https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/loaders/GLTFLoader.js";

    // === 基本セットアップ ===
    const mindarThree = new window.MINDAR.IMAGE.MindARThree({
      container: document.querySelector("#ar-container"),
      imageTargetSrc: "./marker/marker.mind",
      autoStart: true,
      uiScanning: true,
      uiLoading: "読み込み中…"
    });

    const {renderer, scene, camera} = mindarThree;

    // === アンカー ===
    const anchor = mindarThree.addAnchor(0);

    // === モデル読み込み ===
    const loader = new GLTFLoader();
    let model = null;

    loader.load("./scene/model.glb", gltf => {
      model = gltf.scene;
      model.position.set(0, 0, 0);
      model.scale.set(1, 1, 1);     // 初期スケール
      anchor.group.add(model);
    });

    // === モデル回転（昨日安定していた方式） ===
    let rotateAngle = 0;

    // === ピンチで拡大縮小用 ===
    let lastDistance = 0;
    let currentScale = 1;

    function getDistance(touch1, touch2){
      const dx = touch1.clientX - touch2.clientX;
      const dy = touch1.clientY - touch2.clientY;
      return Math.sqrt(dx*dx + dy*dy);
    }

    // ピンチ操作
    document.addEventListener("touchmove", e => {
      if (!model) return;

      if (e.touches.length === 2) {
        const dist = getDistance(e.touches[0], e.touches[1]);

        if (lastDistance !== 0) {
          const delta = dist - lastDistance;
          currentScale += delta * 0.005;  // 拡大縮小の感度

          // 安全範囲（ブルブル防止）
          currentScale = Math.min(3.0, Math.max(0.5, currentScale));

          model.scale.set(currentScale, currentScale, currentScale);
        }

        lastDistance = dist;
      }
    });

    document.addEventListener("touchend", () => {
      lastDistance = 0;
    });

    // === レンダリング ===
    const clock = new THREE.Clock();

    const start = async() => {
      await mindarThree.start();
      renderer.setAnimationLoop(() => {

        if (model && anchor.group.visible) {
          rotateAngle += 0.01;
          model.rotation.y = rotateAngle;
        }

        renderer.render(scene, camera);
      });
    };

    start();
  </script>
</body>
</html>
