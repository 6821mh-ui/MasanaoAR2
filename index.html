<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR名刺（完全版）</title>

    <!-- A-Frame & MindAR -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; }
      #scanning-overlay {
        position: absolute; inset: 0;
        display: flex; justify-content: center; align-items: center;
        background: rgba(0,0,0,0.5); color: white;
        font-size: 1.5rem; z-index: 5;
      }
      #voiceBtn {
        position:absolute; bottom:20px; left:20px;
        padding:10px 20px; z-index:10; 
        font-size:1.2rem;
      }
    </style>
  </head>

  <body>
    <!-- スキャン中表示 -->
    <div id="scanning-overlay">名刺をかざしてください...</div>

    <!-- 音声 -->
    <audio id="voice" src="./assets/voice.mp3"></audio>
    <button id="voiceBtn">▶ 自己紹介</button>

    <a-scene
      mindar-image="imageTargetSrc: ./marker/marker.mind"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <a-asset-item id="avatarModel" src="./scene/model.glb"></a-asset-item>
      </a-assets>

      <a-camera look-controls="enabled:false"></a-camera>

      <!-- モデル -->
      <a-entity id="target" mindar-image-target="targetIndex:0">
        <a-entity id="avatar"
          gltf-model="#avatarModel"
          scale="1 1 1"
          position="0 0 0">
        </a-entity>
      </a-entity>

    </a-scene>

    <script>
      // 音声
      document.getElementById("voiceBtn").onclick = () => {
        document.getElementById("voice").play();
      };

      // スキャン完了
      document.querySelector("a-scene").addEventListener("arReady", () => {
        document.getElementById("scanning-overlay").style.display = "none";
      });

      // ★★★ GLB を確実に回転させる仕組み ★★★
      AFRAME.registerComponent("auto-rotate", {
        tick: function () {
          this.el.object3D.rotation.y += 0.01; // ← 回転
        }
      });

      // GLB 読み込み後に回転コンポーネントを付与
      const avatar = document.getElementById("avatar");
      avatar.addEventListener("model-loaded", () => {
        avatar.setAttribute("auto-rotate", "");
      });
    </script>

  </body>
</html>
