<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR名刺（音声つき）</title>

    <!-- A-Frame & MindAR -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin:0; overflow:hidden; }
      #scanning-overlay {
        position:absolute; inset:0;
        display:flex; justify-content:center; align-items:center;
        background:rgba(0,0,0,0.5); color:white;
        font-size:1.5rem; z-index:5;
      }
      #voiceBtn {
        position:absolute; bottom:20px; left:20px;
        padding:10px 20px; z-index:10; 
        font-size:1.2rem;
      }
    </style>
  </head>

  <body>

    <!-- スキャン中オーバーレイ -->
    <div id="scanning-overlay">名刺の画像にかざしてください…</div>

    <!-- 音声ファイル（自動再生は禁止） -->
    <audio id="voice" src="./assets/voice.mp3"></audio>
    <button id="voiceBtn">▶ 自己紹介を再生</button>

    <a-scene
      mindar-image="imageTargetSrc: ./marker/marker.mind; filterMinCF:0.001; filterBeta:0.01;"
      vr-mode-ui="enabled:false"
      device-orientation-permission-ui="enabled:false"
      renderer="colorManagement:true, physicallyCorrectLights"
      color-space="sRGB">

      <a-assets>
        <!-- モデルのパスを反映 -->
        <a-asset-item id="avatarModel" src="./scene/model.glb"></a-asset-item>
      </a-assets>

      <a-camera look-controls="enabled:false"></a-camera>

      <!-- マーカーに応答する部分 -->
      <a-entity mindar-image-target="targetIndex:0">
        <a-gltf-model
          src="#avatarModel"
          scale="2 2 2"
          rotation="45 0 0"
          position="0 0 0"
          animation-mixer="clip:*; loop:repeat;">
        </a-gltf-model>
      </a-entity>

    </a-scene>

    <script>
      // 音声再生（iPhone 対応）
      document.getElementById("voiceBtn").addEventListener("click", () => {
        const audio = document.getElementById("voice");
        audio.play();
      });

      // AR準備完了 → オーバーレイ非表示
      const overlay = document.getElementById("scanning-overlay");
      document.querySelector("a-scene").addEventListener("arReady", () => {
        overlay.style.display = "none";
      });
    </script>

  </body>
</html>
