<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AR名刺 - タップして開始</title>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    #startScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: white;
      font-size: 24px;
      text-align: center;
      z-index: 10;
    }

    #startButton {
      margin-top: 20px;
      padding: 15px 30px;
      font-size: 22px;
      background: #28a3ff;
      border: none;
      border-radius: 10px;
      color: white;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script>
</head>

<body>
  <!-- 🔊 音声ファイル -->
  <audio id="voice" src="assets/voice.mp3"></audio>

  <!-- 🎬 最初の「タップして開始」画面 -->
  <div id="startScreen">
      タップして開始<br>
      <button id="startButton">▶ はじめる</button>
  </div>

  <!-- 📷 AR本体 -->
  <div id="ar-container" style="width:100%; height:100%; display:none;">
    <mindar-image id="mindar" image-target-src="marker/marker.mind" auto-start="false">
      <mindar-image-target target-index="0">
        <three-scene>
          <script type="module">
            import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js";
            import {GLTFLoader} from "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/loaders/GLTFLoader.js";

            const sceneEl = document.querySelector("three-scene").object3D;

            const loader = new GLTFLoader();
            loader.load("scene/model.glb", (gltf) => {
              const model = gltf.scene;
              model.scale.set(0.5, 0.5, 0.5);
              model.position.set(0, -0.5, 0);
              sceneEl.add(model);
            });
          </script>
        </three-scene>
      </mindar-image-target>
    </mindar-image>
  </div>

  <script>
    const startScreen = document.getElementById("startScreen");
    const startButton = document.getElementById("startButton");
    const voice = document.getElementById("voice");
    const mindar = document.getElementById("mindar");

    startButton.onclick = async () => {
      // ボタンを押した → スマホの自動再生制限を解除
      voice.play();

      // 画面切り替え
      startScreen.style.display = "none";
      document.getElementById("ar-container").style.display = "block";

      // AR開始
      await mindar.start();
    };
  </script>

</body>
</html>
