<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant AR Card</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; }
      #scanning-overlay {
        display: flex; align-items: center; justify-content: center;
        position: absolute; left: 0; right: 0; top: 0; bottom: 0;
        background: rgba(0,0,0,0.5); color: white; z-index: 2;
      }
    </style>
  </head>

  <body>
    <div id="scanning-overlay">名刺の画像にかざしてください...</div>

    <a-scene
      mindar-image="imageTargetSrc: ./marker/marker.mind; filterMinCF:0.1; filterBeta: 0.03;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <a-asset-item id="avatarModel" src="./scene/model.glb"></a-asset-item>
        <audio id="voice" src="./assets/voice.mp3" preload="auto"></audio>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="anchor">

        <!-- モデルをラップして安定化 -->
        <a-entity id="wrapper" position="0 0 0" rotation="0 0 0" scale="2 2 2">
          <a-gltf-model id="avatar" src="#avatarModel"></a-gltf-model>
        </a-entity>

        <!-- ここで回転させる（安定版） -->
        <a-animation
          attribute="rotation"
          to="0 360 0"
          dur="8000"
          repeat="indefinite"
          easing="linear"
          begin="startRotate">
        </a-animation>

      </a-entity>

      <!-- 音声再生スクリプト -->
      <script>
        document.querySelector('#anchor').addEventListener('targetFound', () => {
          document.querySelector('#voice').play();
          document.querySelector('#wrapper').emit('startRotate');
        });

        document.querySelector('#anchor').addEventListener('targetLost', () => {
          document.querySelector('#voice').pause();
        });
      </script>

    </a-scene>
  </body>
</html>
