<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>MindAR AR Model</title>

  <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>

  <style>
    body,html{
      margin:0;
      padding:0;
      overflow:hidden;
    }
    #ar-container{
      width:100vw;
      height:100vh;
      touch-action:none; /* ←★ ピンチ動作用に必須 */
    }
  </style>
</head>

<body>
  <div id="ar-container"></div>

  <script type="module">
    import {GLTFLoader} from "https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/loaders/GLTFLoader.js";

    const mindarThree = new window.MINDAR.IMAGE.MindARThree({
      container: document.querySelector("#ar-container"),
      imageTargetSrc: "./marker/marker.mind",
      autoStart: true,
    });

    const {renderer, scene, camera} = mindarThree;

    const anchor = mindarThree.addAnchor(0);

    const loader = new GLTFLoader();
    let model = null;

    loader.load("./scene/model.glb", gltf => {
      model = gltf.scene;
      model.scale.set(1, 1, 1);
      anchor.group.add(model);
    });

    // ========= モデル回転（昨日の安定版） =========
    let rotateAngle = 0;

    // ========= ピンチ拡大縮小（canvasに直接） =========
    let lastDistance = 0;
    let currentScale = 1;

    function getDistance(t1, t2){
      const dx = t1.clientX - t2.clientX;
      const dy = t1.clientY - t2.clientY;
      return Math.sqrt(dx*dx + dy*dy);
    }

    const canvas = renderer.domElement;  // ← ★ ここに付けると MindAR でも動く

    canvas.addEventListener("touchmove", e => {
      if (!model) return;

      if (e.touches.length === 2) {
        const dist = getDistance(e.touches[0], e.touches[1]);

        if (lastDistance !== 0) {
          const delta = dist - lastDistance;
          currentScale += delta * 0.004;  // 感度

          // 安定のため制限
          currentScale = Math.max(0.5, Math.min(3.0, currentScale));

          model.scale.set(currentScale, currentScale, currentScale);
        }
        lastDistance = dist;
      }
    });

    canvas.addEventListener("touchend", () => {
      lastDistance = 0;
    });

    // ========= レンダリング =========
    const start = async() => {
      await mindarThree.start();
      renderer.setAnimationLoop(() => {

        if (model && anchor.group.visible) {
          rotateAngle += 0.01;
          model.rotation.y = rotateAngle;
        }

        renderer.render(scene, camera);
      });
    };

    start();
  </script>
</body>
</html>
