<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR名刺 - タップして開始</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-prod.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image.css">

<style>
  body, html { margin:0; padding:0; overflow:hidden; }

  #startScreen {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.85);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    color:#fff; font-size:24px; z-index:10;
  }
  #startButton {
    margin-top:20px; padding:15px 30px;
    font-size:20px; background:#28a3ff;
    border:none; border-radius:10px; color:#fff;
  }
</style>
</head>

<body>

<!-- 🔊 音声 -->
<audio id="voice" src="assets/voice.mp3"></audio>

<!-- 🎬 開始画面 -->
<div id="startScreen">
  タップして開始
  <button id="startButton">▶ はじめる</button>
</div>

<!-- 📷 AR表示領域 -->
<div id="ar-area" style="width:100%; height:100%; display:none;">
  <mindar-image id="mindar" image-target-src="marker/marker.mind">
    <mindar-image-target target-index="0">
      <three id="three-scene"></three>
    </mindar-image-target>
  </mindar-image>
</div>

<script>
const startScreen = document.getElementById("startScreen");
const startButton = document.getElementById("startButton");
const voice = document.getElementById("voice");
const mindarContainer = document.getElementById("mindar");
const threeContainer = document.getElementById("three-scene");

startButton.onclick = async () => {
  // スマホの自動再生解除
  voice.play();

  // 画面切替
  startScreen.style.display = "none";
  document.getElementById("ar-area").style.display = "block";

  // AR開始
  const mindar = mindarContainer;
  const startResult = await mindar.start();

  // Three.js の Scene にアクセス
  const scene = threeContainer.object3D;

  // GLBモデル読み込み
  const loader = new THREE.GLTFLoader();
  loader.load("scene/model.glb", (gltf) => {
    const model = gltf.scene;
    model.scale.set(0.5, 0.5, 0.5);
    model.position.set(0, -0.3, 0);
    scene.add(model);
  });
};
</script>

</body>
</html>
