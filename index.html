<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR名刺（100%動作版）</title>

  <!-- A-Frame & MindAR -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin:0; overflow:hidden; }

    #overlay {
      position:fixed; inset:0;
      display:flex; justify-content:center; align-items:center;
      background:rgba(0,0,0,0.5);
      color:white;
      z-index:5;
      font-size:1.4rem;
    }

    #voiceBtn {
      position:fixed;
      left:20px; bottom:20px;
      z-index:10;
      padding:10px 20px;
      font-size:1.2rem;
    }
  </style>
</head>

<body>

<div id="overlay">名刺をかざしてください…</div>

<audio id="voice" src="./assets/voice.mp3"></audio>
<button id="voiceBtn">▶ 自己紹介</button>

<a-scene
  mindar-image="imageTargetSrc: ./marker/marker.mind;"
  vr-mode-ui="enabled:false"
  device-orientation-permission-ui="enabled:false"
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true">

  <a-assets>
    <a-asset-item id="model" src="./scene/model.glb"></a-asset-item>
  </a-assets>

  <a-camera look-controls="enabled:false"></a-camera>

  <!-- 回転は親エンティティに付与（MindARで最安定） -->
  <a-entity mindar-image-target="targetIndex:0"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear">

    <a-gltf-model
      src="#model"
      scale="2 2 2"
      position="0 0 0">
    </a-gltf-model>

  </a-entity>

</a-scene>

<script>
  // 音声ボタン
  document.getElementById("voiceBtn").addEventListener("click", () => {
    document.getElementById("voice").play();
  });

  // AR準備完了でオーバーレイ消去
  document.querySelector("a-scene")
    .addEventListener("arReady", () => {
      document.getElementById("overlay").style.display = "none";
    });
</script>

</body>
</html>
