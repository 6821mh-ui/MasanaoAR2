<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR名刺（確実回転版）</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin:0; overflow:hidden; }

    #overlay {
      position:absolute;
      inset:0;
      display:flex;
      justify-content:center;
      align-items:center;
      background:rgba(0,0,0,0.5);
      color:white;
      font-size:1.5rem;
      z-index:5;
    }

    #btn {
      position:absolute;
      bottom:20px;
      left:20px;
      z-index:10;
      padding:10px 20px;
    }
  </style>
</head>

<body>

<div id="overlay">名刺をかざしてください…</div>

<audio id="voice" src="./assets/voice.mp3"></audio>
<button id="btn">▶ 再生</button>

<a-scene
  mindar-image="imageTargetSrc: ./marker/marker.mind;"
  vr-mode-ui="enabled:false"
  device-orientation-permission-ui="enabled:false">

  <a-assets>
    <a-asset-item id="model" src="./scene/model.glb"></a-asset-item>
  </a-assets>

  <a-camera look-controls="enabled:false"></a-camera>

  <!-- ⭐ここが重要：親を回転させる -->
  <a-entity mindar-image-target="targetIndex:0"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear">

    <a-gltf-model
      src="#model"
      scale="2 2 2"
      position="0 0 0">
    </a-gltf-model>

  </a-entity>

</a-scene>

<script>
document.getElementById("btn").addEventListener("click", () => {
  document.getElementById("voice").play();
});

document.querySelector("a-scene").addEventListener("arReady", () => {
  document.getElementById("overlay").style.display = "none";
});
</script>

</body>
</html>
