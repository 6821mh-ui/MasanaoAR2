<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR名刺（安定版）</title>

    <!-- A-Frame & MindAR -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin:0; overflow:hidden; }

      #voiceBtn {
        position:absolute;
        bottom:20px; left:20px;
        padding:10px 20px;
        font-size:1.2rem;
        z-index:10;
        background:#0066ff; color:white;
        border:none; border-radius:10px;
      }
    </style>
  </head>

  <body>

    <audio id="voice" src="./assets/voice.mp3"></audio>
    <button id="voiceBtn">▶ 音声再生</button>

    <a-scene
      mindar-image="imageTargetSrc: ./marker/marker.mind; filterMinCF:0.02; filterBeta:0.005;"
      vr-mode-ui="enabled:false"
      device-orientation-permission-ui="enabled:false">

      <a-assets>
        <a-asset-item id="avatarModel" src="./scene/model.glb"></a-asset-item>
      </a-assets>

      <a-camera look-controls="enabled:false"></a-camera>

      <a-entity id="marker" mindar-image-target="targetIndex:0">
        
        <a-entity id="wrapper" position="0 0 0" rotation="0 0 0">
          <a-gltf-model
            id="model"
            src="#avatarModel"
            scale="2 2 2"
            rotation="45 0 0"
            animation-mixer="clip:*; loop:repeat;">
          </a-gltf-model>
        </a-entity>

      </a-entity>
    </a-scene>


    <script>
      const voiceBtn = document.getElementById("voiceBtn");
      const voice = document.getElementById("voice");

      voiceBtn.onclick = () => {
        voice.play();
      };

      const wrapper = document.getElementById("wrapper");

      let rotateLoop = null;

      document.getElementById("marker").addEventListener("targetFound", () => {
        if (!rotateLoop) {
          rotateLoop = setInterval(() => {
            let r = wrapper.getAttribute("rotation");
            r.y += 1;
            wrapper.setAttribute("rotation", r);
          }, 16);
        }
      });

      document.getElementById("marker").addEventListener("targetLost", () => {
        clearInterval(rotateLoop);
        rotateLoop = null;
      });
    </script>

  </body>
</html>
