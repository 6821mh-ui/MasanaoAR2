<!DOCTYPE html>
<html>
  <head>
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.5.0/dist/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.155.0/examples/js/controls/OrbitControls.js"></script>
    <style>
      body, html { margin: 0; padding: 0; overflow: hidden; }
      #voiceBtn {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 999;
        padding: 10px 15px;
        font-size: 16px;
      }
    </style>
  </head>

  <body>
    <button id="voiceBtn">🔊 音声</button>

    <a-scene
      mindar-image="imageTargetSrc: ./marker/marker.mind;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      renderer="colorManagement: true">
      
      <!-- カメラ -->
      <a-camera position="0 0 0"></a-camera>

      <!-- アンカー（MindARが制御する）-->
      <a-entity mindar-image-target="targetIndex: 0">
        <!-- モデル操作用のコンテナ（OrbitControls + 自動回転） -->
        <a-entity id="modelContainer" rotation="0 0 0">
          <a-entity id="model"
            gltf-model="./scene/model.glb"
            scale="0.5 0.5 0.5"
            rotation="0 0 0">
          </a-entity>
        </a-entity>
      </a-entity>
    </a-scene>

    <script>
      // ========= 音声 ==========
      const audio = new Audio("./assets/voice.mp3");
      document.getElementById("voiceBtn").onclick = () => audio.play();

      // ========= 自動水平回転 ==========
      let container = null;
      document.querySelector("a-scene").addEventListener("loaded", () => {
        container = document.getElementById("modelContainer").object3D;

        function rotate() {
          if (container) {
            container.rotation.y += 0.01; // 水平回転のみ
          }
          requestAnimationFrame(rotate);
        }
        rotate();
      });

      // ========= タッチ操作（OrbitControls） ==========
      AFRAME.registerComponent("orbit-controls", {
        init: function () {
          const threeScene = this.el.sceneEl;
          const camera = threeScene.camera;
          const renderer = threeScene.renderer;

          this.controls = new THREE.OrbitControls(camera, renderer.domElement);
          this.controls.enablePan = false;   // 平行移動禁止（ARでずれるため）
          this.controls.enableZoom = true;   // ← 拡大縮小 OK
          this.controls.enableRotate = true; // ← モデルの回転操作 OK
        },
        tick: function () {
          this.controls.update();
        }
      });

      // カメラに OrbitControls を付与
      document.querySelector("a-camera").setAttribute("orbit-controls", "");
    </script>
  </body>
</html>
