<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR名刺（安定版）</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-orbit-controls-component@1.3.0/dist/aframe-orbit-controls-component.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    #scanning-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.5);
      color: white;
      font-size: 1.5rem;
      z-index: 5;
    }

    #voiceBtn {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 10;
      padding: 10px 20px;
      font-size: 1.2rem;
      background: white;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <div id="scanning-overlay">名刺をかざしてください…</div>

  <audio id="voice" src="./assets/voice.mp3"></audio>
  <button id="voiceBtn">▶ 音声を再生</button>

  <a-scene
    mindar-image="imageTargetSrc: ./marker/marker.mind;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <a-asset-item id="avatarModel" src="./scene/model.glb"></a-asset-item>
    </a-assets>

    <!-- カメラ + OrbitControls -->
    <a-entity
      id="cameraRig"
      position="0 0 0"
      orbit-controls="
        target: 0 0 0;
        enableDamping: true;
        dampingFactor: 0.1;
        rotateSpeed: 0.4;
        zoomSpeed: 0.4;
        minDistance: 0.5;
        maxDistance: 4;
      ">
      <a-camera id="mainCamera"></a-camera>
    </a-entity>

    <!-- マーカーターゲット -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- モデル本体（浮かせる・角度リセット・scale調整） -->
      <a-gltf-model
        id="model"
        src="#avatarModel"
        scale="1.6 1.6 1.6"
        position="0 0.05 0"
        rotation="0 0 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 7000; easing: linear;">
      </a-gltf-model>

    </a-entity>

  </a-scene>

  <script>
    // 音声再生
    voiceBtn.addEventListener("click", () => {
      document.getElementById("voice").play();
    });

    // AR準備完了でオーバーレイ消す
    document.querySelector("a-scene").addEventListener("arReady", () => {
      document.getElementById("scanning-overlay").style.display = "none";
    });
  </script>

</body>
</html>
